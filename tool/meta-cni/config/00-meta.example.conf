{
  "cniVersion": "1.0.0",
  "name": "crane-meta",
  "type": "crane-meta",
  "capabilities": {
    "portMappings": true,
    "io.kubernetes.cri.pod-annotations": true
  },
  "logLevel": "debug",
  "timeoutSeconds": 10,
  "runtimeOverride": {
    "args": [
      "IgnoreUnknown=true",
      "-legacyTag"
    ],
    "envs": [
      "A=''",
      "NO_PROXY=svc.local",
      "-DROP_ME"
    ]
  },
  "pipelines": [
    {
      "name": "ethernet",
      "ifName": "eth0",
      "delegates": [
        {
          "name": "primary-macvlan",
          "conf": {
            "cniVersion": "1.0.0",
            "type": "macvlan",
            "master": "eno1",
            "mode": "bridge",
            "ipam": {
              "type": "host-local",
              "ranges": [
                [
                  {
                    "subnet": "10.10.0.0/24",
                    "rangeStart": "10.10.0.10",
                    "rangeEnd": "10.10.0.50",
                    "gateway": "10.10.0.1"
                  }
                ]
              ]
            }
          }
        },
        {
          "name": "portmap",
          "conf": {
            "type": "portmap",
            "snat": true,
            "capabilities": {
              "portMappings": true
            }
          }
        }
      ]
    },
    {
      "name": "roce",
      "ifNamePrefix": "roce",
      "delegates": [
        {
          "name": "sriov",
          "conf": {
            "type": "sriov",
            "vlan": 0,
            "deviceID": "{{.Gres.Device}}",
            "ipam": {
              "type": "host-local",
              "ranges": [
                [
                  {
                    "subnet": "10.56.0.0/16"
                  }
                ]
              ]
            }
          }
        },
        {
          "name": "rdma",
          "conf": {
            "type": "rdma"
          }
        }
      ]
    }
  ]
}
